#################################
#             Shadows           #
#################################
shadow-radius = 7;

shadow-opacity = .75

shadow-offset-x = -7;

shadow-offset-y = -7;

shadow-exclude = [
    "window_type = 'dock'",
    "name = 'Notification'",
    "class_g ?= 'Notify-osd'",
    "name = 'Plank'",
    "name = 'Docky'",
    "name = 'Kupfer'",
    "name = 'xfce4-notifyd'",
    "name *= 'VLC'",
    "name *= 'compton'",
    "name *= 'Chromium'",
    "name *= 'Chrome'",
    "class_g = 'Firefox' && argb",
    "class_g = 'Conky'",
    "class_g = 'Kupfer'",
    "class_g = 'Synapse'",
    "class_g ?= 'Notify-osd'",
    "class_g ?= 'Cairo-dock'",
    "class_g = 'Cairo-clock'",
    "class_g ?= 'Xfce4-notifyd'",
    "class_g ?= 'Xfce4-power-manager'",
    "_GTK_FRAME_EXTENTS@:c",
];


#################################
#           Fading              #
#################################

fading = false

fade-in-step = 0.03;

fade-out-step = 0.03;

fade-exclude = [
  "class_g ?= 'Cairo-dock'",
  "class_g = 'Cairo-clock'",
  "window_type = 'dock'",
]

#################################
#   Transparency / Opacity      #
#################################

 # inactive-opacity-override = true

inactive-opacity-override = false;

focus-exclude = [ 
  "class_g ?= 'Cairo-dock'",
  "class_g = 'Cairo-clock'",
];

opacity-rule = [
  "75:class_g = 'Alacritty'",
]


#################################
#     Background-Blurring       #
#################################
blur: {
  method = "dual_kawase";
  strength = 15;
};
#
blur-kern = "3x3box";


# Exclude conditions for background blur.
blur-background-exclude = [
  # "window_type = 'dock'",
  # "window_type = 'desktop'",
  # "_GTK_FRAME_EXTENTS@:c",
  "window_type = 'dock'",
  "class_g = '1Password'",
  "class_g = 'Arandr'",
  "class_g = 'Ark'",
  "class_g = 'Cisco AnyConnect Secure Mobility Client'",
  "class_g ?= 'Cairo-dock'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Dunst'",
  "class_g = 'firefox'",
  "class_g *= 'Gimp'",
  "class_g = 'Lxappearance'",
  "class_g = 'obsidian'",
  "class_g = 'org.remmina.Remmina'",
  "class_g = 'pcmanfm-qt'",
  # "class_g = 'Pavucontrol'",
  "class_g = 'qt5ct'",
  # "class_g = 'Rofi'",
  "class_g = 'teams-for-linux'",
  "class_g = 'Timeshift-gtk'",
  "class_g = 'Spotify'",
  "class_g = 'Variety'",
  "class_g = 'Virt-manager'",
  "name *= 'Chromium'",
  "name *= 'Chrome'",
  "QTILE_INTERNAL:32c = 1", # qtile bar
];

#################################
#       General Settings        #
#################################

# Daemonize process. Fork to background after initialization. Causes issues with certain (badly-written) drivers.
# daemon = false

backend = "glx";
vsync = true;

glx-copy-from-front = true;
glx-swap-method = 2;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

corner-radius=15; # round-corners=25;
rounded-corners-exclude = [
  "_NET_WM_STATE@[*]:a *?= 'maximized'",
  "window_type = 'dock'",
  "class_g = 'URxvt'",
  "class_g = 'XTerm'",
  "class_g = 'code-oss'",
  "class_g = 'Thunderbird'",
  "QTILE_INTERNAL:32c = 1", # qtile bar
];
round-borders = 1;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true
detect-client-leader = true
use-damage = true
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.75; }
  dropdown_menu = { opacity = 0.75; }
};

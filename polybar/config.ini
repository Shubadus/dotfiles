[bar/qtile]
width = 1912
height = 32
; fixed-center = true
bottom = false
offset-x = 4
offset-y = 4
radius = 10

dpi = 96

background = ${colors.base}
foreground = ${colors.text}


padding = 2
module-margin = 2

separator = 

tray-detached = false
tray-position = center 
tray-maxsize = 24


font-0 = NotoSans Nerd Font:size=18;4
modules-left = xworkspaces
; modules-center = date
modules-right = pulseaudio cpu memory battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/battery]
type = internal/battery

full-at = 100
low-at = 10

battery = BAT0
adapter = AC

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.base}
format-charging-foreground = ${colors.text}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.base}
format-discharging-foreground = ${colors.text}

format-full = ${icons/battery.charging} 

format-full-background = ${colors.base}
format-full-foreground = ${colors.text}

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = ${icons/battery.20}
ramp-capacity-1 = ${icons/battery.40}
ramp-capacity-2 = ${icons/battery.60}
ramp-capacity-3 = ${icons/battery.80}
ramp-capacity-4 = ${icons/battery.100}

animation-charging-0 = ${icons/battery.20}
animation-charging-1 = ${icons/battery.40}
animation-charging-2 = ${icons/battery.60}
animation-charging-3 = ${icons/battery.80}
animation-charging-4 = ${icons/battery.100}
animation-charging-framerate = 500

[module/xworkspaces]
type = internal/xworkspaces

; format = <label-monitor><label-state>

label-active = %name%
label-active-background = ${colors.base}
label-active-foreground = ${colors.sapphire}
label-active-underline = ${colors.saphhire}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.crust}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.crust}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = ${icons.volume}
format-volume-prefix-foreground = ${colors.text}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.crust}

[module/memory]
type = internal/memory
interval = 2
format-prefix = ${icons.memory}
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = ${icons.cpu}
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/network]
type = internal/network
interface-type = wireless
label-connected = "%essid% %signal%%"

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

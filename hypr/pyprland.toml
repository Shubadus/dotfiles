[pyprland]
plugins = [
  "scratchpads",
  "workspaces_follow_focus"
]

# [workspaces_follow_focus]


[scratchpads.term]
animation = "fromTop"
command = "alacritty --class dropterm"
class = "dropterm"
# command = "footclient -a dropterm"
# lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.vpn]
animation = "fromTop"
command = "/opt/cisco/anyconnect/bin/vpnui"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.spotify]
animation = "fromTop"
class = "Spotify"
command = "spotify"
# command = "flatpak run com.spotify.Client"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.network_manager]
animation = "fromTop"
command = "nm-connection-editor"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.audio]
animation = "fromTop"
command = "pavucontrol"
class = "pavucontrol"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.sysmonitor]
animation = "fromTop"
command = "alacritty --class sysmonitor -e btop"
class = "sysmonitor"
# command = "footclient -a sysmonitor -e btop"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

[scratchpads.ranger]
animation = "fromTop"
command = "alacritty --class ranger -e ranger"
class = "ranger"
# command = "footclient -a ranger -e ranger"
lazy = true
margin = 36
size = "80% 60%"
unfocus = "hide"

